name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish Python package
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - run: python scripts/check_wheel_compat.py dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  windows-package:
    name: Build Windows package artifact
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]" setuptools wheel
      - name: Package
        shell: pwsh
        run: ./scripts/package-release.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-windows-x64
          path: |
            dist/*.zip
            dist/*.zip.sha256
