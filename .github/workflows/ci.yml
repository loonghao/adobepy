name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quick:
    name: Quick contracts (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.8"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]"
      - run: npm run test:quick

  bridges:
    name: Bridge protocol mocks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:bridges

  package:
    name: Windows package smoke
    runs-on: windows-latest
    needs:
      - quick
      - bridges
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]" setuptools wheel
      - name: Build package
        shell: pwsh
        run: ./scripts/package-release.ps1 -SkipTests
      - name: Check package outputs
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "adobepy-*-windows-x64.zip" | Select-Object -First 1
          if (-not $zip) { throw "package zip was not created" }
          if (-not (Test-Path "$($zip.FullName).sha256")) { throw "package checksum was not created" }
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-windows-x64
          path: |
            dist/*.zip
            dist/*.zip.sha256
